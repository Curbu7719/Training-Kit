<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Wingmate amblem / pilot kanatları">
  <title>Wingmate — pilot kanatları amblemi</title>
  <defs>
    <linearGradient id="feat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF1A1A"/>
      <stop offset="1" stop-color="#B30000"/>
    </linearGradient>
  </defs>

  <!-- WINGS: right side group, left mirrored -->
  <g stroke="#8F0000" stroke-width="2.5" stroke-linejoin="round">
    <!-- right wing -->
    <g fill="url(#feat)">
      <path d="M300 240 Q374 220 438 228 Q374 248 300 250 Z"/>
      <path d="M300 254 Q368 240 424 248 Q368 266 300 266 Z"/>
      <path d="M300 270 Q360 258 408 266 Q360 282 300 282 Z"/>
      <path d="M300 286 Q348 276 390 284 Q348 296 300 296 Z"/>
    </g>
    <!-- left wing (mirror) -->
    <g fill="url(#feat)" transform="translate(512,0) scale(-1,1)">
      <path d="M300 240 Q374 220 438 228 Q374 248 300 250 Z"/>
      <path d="M300 254 Q368 240 424 248 Q368 266 300 266 Z"/>
      <path d="M300 270 Q360 258 408 266 Q360 282 300 282 Z"/>
      <path d="M300 286 Q348 276 390 284 Q348 296 300 296 Z"/>
    </g>
  </g>

  <!-- central roundel -->
  <circle cx="256" cy="262" r="52" fill="#E60000" stroke="#FFFFFF" stroke-width="7"/>
  <!-- ascending double chevron = ileri / hız -->
  <g fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="230,272 256,242 282,272"/>
    <polyline points="230,288 256,258 282,288"/>
  </g>

  <!-- rank ribbon (boş — kademe rengi/etiketi için) -->
  <path d="M206 320 H306 L290 360 H222 Z" fill="#2B2B2B"/>
  <path d="M222 360 H290 L256 384 Z" fill="#1F1F1F"/>
</svg>
