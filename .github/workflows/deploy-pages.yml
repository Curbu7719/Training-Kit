name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # The Supabase anon key is a PUBLIC client key — it ships in the browser
      # bundle and is protected by Row-Level Security, so it is safe to expose.
      VITE_SUPABASE_URL: https://ymliczohkmksptbxtpah.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltbGljem9oa21rc3B0Ynh0cGFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjcxMDksImV4cCI6MjA5NzMwMzEwOX0.RY9euADbwTgaetTDuviOnXLW3XbZ58Gy0SBaqF85egQ
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: SPA fallback — serve index.html for unknown client routes
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
